<style>
  :root {
    /* Paleta Dark Mode Moderna (Estilo Linear/Vercel) */
    --bg: #0B0F19;

    --bg3: #1F2937;

    --border: #334155;
    --border2: #475569;

    --red: #EF4444;

  }

  #setup-screen h1 { font-size: 2.25rem; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 0.5rem; }
  #setup-screen p { color: var(--text2); margin-bottom: 2.5rem; font-size: 1.1rem; }
  
  .setup-card {

    padding: 12px 14px;

    outline: none; 
    transition: all 0.2s ease; 
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
  }
  .field input:focus, .field select:focus, .field textarea:focus { 
    border-color: var(--orange);

  .field textarea { resize: vertical; min-height: 90px; font-family: inherit; }
  .field select option { background: var(--bg2); }
  
  /* BUTTONS */
  .btn {

  }

  .os-table tr:hover td { background: rgba(255, 255, 255, 0.02); }

  .modal-header h2 { font-size: 1.15rem; font-weight: 700; color: var(--text); }

  .close-btn { background: var(--bg); border: 1px solid var(--border); color: var(--text2); cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; }
  .close-btn:hover { color: var(--text); background: var(--surface); border-color: var(--text3); transform: rotate(90deg); }
