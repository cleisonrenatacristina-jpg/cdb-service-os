<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CDB Service OS — Ordens de Serviço</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1e2336;
    --surface: #242840;
    --border: #2e3452;
    --border2: #3d4570;
    --orange: #1e3a8a;
    --orange2: #1e40af;
    --orange-dim: rgba(30,58,138,0.15);
    --text: #e8eaf0;
    --text2: #8b90a8;
    --text3: #565c7a;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --blue: #3b82f6;
    --radius: 8px;
    --radius-lg: 12px;
    --font-mono: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }

  /* SETUP SCREEN */
  #setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  #setup-screen h1 { font-size: 2rem; font-weight: 700; color: #3b82f6; letter-spacing: -0.5px; margin-bottom: 0.25rem; }
  #setup-screen p { color: var(--text2); margin-bottom: 2rem; }
  .setup-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; width: 100%; max-width: 480px; }
  .setup-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--text); }
  
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select, .field textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 10px 12px; font-size: 14px; outline: none; transition: border 0.2s; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--blue); }
  .field textarea { resize: vertical; min-height: 80px; font-family: inherit; }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.15s; text-decoration: none;}
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:hover { background: var(--orange2); }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--border2); background: var(--bg3); }
  .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .btn-full { width: 100%; justify-content: center; }

  /* LAYOUT APP */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo { font-weight: 700; font-size: 1.1rem; color: var(--blue); font-family: var(--font-mono); letter-spacing: 1px; }
  nav { display: flex; gap: 4px; }
  nav button { background: none; border: none; color: var(--text2); padding: 8px 14px; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 500; }
  nav button.active { color: #fff; background: var(--blue); }
  main { flex: 1; padding: 1.5rem; max-width: 1200px; margin: 0 auto; width: 100%; }

  /* CARDS / TABLES */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  @media(max-width:768px) { .grid-4 { grid-template-columns: 1fr 1fr; } }

  /* STAT CARDS */
  .stat { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .stat-value { font-size: 24px; font-weight: 700; font-family: var(--font-mono); }

  /* OS TABLE */
  .table-responsive { overflow-x: auto; }
  .os-table { width: 100%; border-collapse: collapse; text-align: left; }
  .os-table th { font-size: 11px; color: var(--text3); text-transform: uppercase; padding: 12px; border-bottom: 1px solid var(--border); }
  .os-table td { padding: 12px; border-bottom: 1px solid var(--border); }
  .os-id { font-family: var(--font-mono); font-weight: bold; color: #fff; background: #000; padding: 2px 6px; border-radius: 4px; }
  
  .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase;}
  .badge-aberta { background: rgba(59,130,246,0.15); color: var(--blue); }
  .badge-andamento { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge-concluida { background: rgba(34,197,94,0.15); color: var(--green); }
  
  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem; border-bottom: 1px solid var(--border); }
  .modal-body { padding: 1.25rem; flex: 1; }
  .modal-footer { padding: 1rem; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

  .filter-bar { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filter-bar input, .filter-bar select { flex: 1; min-width: 150px; background: var(--bg2); border: 1px solid var(--border); padding: 8px; color: white; border-radius: 6px; }
</style>
</head>
<body>

<div id="setup-screen">
  <div style="text-align:center;margin-bottom:2rem;">
    <h1>CDB SERVICE OS</h1>
    <p>Manutenção Industrial — Sistema de Gestão</p>
  </div>
  <div class="setup-card">
    <h2>⚙️ Credenciais do Supabase</h2>
    <div class="field">
      <label>URL do Projeto</label>
      <input id="cfg-url" type="url" value="https://vrmlvywprggjkdqahodr.supabase.co"/>
    </div>
    <div class="field">
      <label>Chave Pública (Anon API Key)</label>
      <input id="cfg-key" type="password" placeholder="Insira sua supabase anon key..."/>
    </div>
    <button class="btn btn-primary btn-full" onclick="initSupabase()">Conectar e Entrar</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">CDB <span>SERVICE OS</span></div>
    <div class="header-right">
      <button class="btn btn-primary" onclick="openNewOsModal()">+ Nova OS</button>
      <button class="btn btn-secondary" onclick="logout()">Sair</button>
    </div>
  </header>

  <main>
    <div class="grid-4">
      <div class="stat"><div class="stat-label">Total Geral</div><div class="stat-value" id="stat-total">0</div></div>
      <div class="stat"><div class="stat-label">Abertas</div><div class="stat-value" style="color:var(--blue)" id="stat-abertas">0</div></div>
      <div class="stat"><div class="stat-label">Em Andamento</div><div class="stat-value" style="color:var(--yellow)" id="stat-andamento">0</div></div>
      <div class="stat"><div class="stat-label">Concluídas</div><div class="stat-value" style="color:var(--green)" id="stat-concluidas">0</div></div>
    </div>

    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Buscar por cliente ou máquina..." oninput="renderTable()">
      <select id="filter-status" onchange="renderTable()">
        <option value="">Todos os Status</option>
        <option value="aberta">Aberta</option>
        <option value="andamento">Em Andamento</option>
        <option value="concluida">Concluída</option>
      </select>
    </div>

    <div class="card">
      <div class="table-responsive">
        <table class="os-table">
          <thead>
            <tr>
              <th>OS ID</th>
              <th>Cliente</th>
              <th>Equipamento</th>
              <th>Prioridade</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="os-table-body">
            </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="os-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nova Ordem de Serviço</h2>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <form id="os-form">
        <input type="hidden" id="os-id-field">
        <div class="field">
          <label>Cliente</label>
          <input type="text" id="os-cliente" required>
        </div>
        <div class="field">
          <label>Equipamento / Máquina</label>
          <input type="text" id="os-equipamento" required>
        </div>
        <div class="field">
          <label>Descrição do Problema / Serviço</label>
          <textarea id="os-descricao" required></textarea>
        </div>
        <div class="grid-4" style="grid-template-columns:1fr 1fr; margin-bottom:0;">
          <div class="field">
            <label>Prioridade</label>
            <select id="os-prioridade">
              <option value="baixa">Baixa</option>
              <option value="media">Média</option>
              <option value="alta">Alta</option>
            </select>
          </div>
          <div class="field">
            <label>Status</label>
            <select id="os-status">
              <option value="aberta">Aberta</option>
              <option value="andamento">Em Andamento</option>
              <option value="concluida">Concluída</option>
            </select>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveOs()">Salvar OS</button>
    </div>
  </div>
</div>

<script>
  let supabaseClient = null;
  let localOsData = [];

  // Inicializa conexão com Supabase
  async function initSupabase() {
    const url = document.getElementById('cfg-url').value;
    const key = document.getElementById('cfg-key').value;

    if(!key) {
      alert("Por favor, insira a chave secreta Anon do seu Supabase.");
      return;
    }

    supabaseClient = supabase.createClient(url, key);
    
    // Testa conexão buscando dados
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    
    await fetchOrders();
  }

  // Deslogar / Voltar à tela anterior
  function logout() {
    document.getElementById('app').style.display = 'none';
    document.getElementById('setup-screen').style.display = 'flex';
  }

  // Busca dados do Supabase
  async function fetchOrders() {
    try {
      const { data, error } = await supabaseClient
        .from('ordens_servico')
        .select('*')
        .order('id', { ascending: false });

      if (error) throw error;
      
      localOsData = data || [];
      calculateStats();
      renderTable();
    } catch (err) {
      alert("Erro ao buscar dados do Supabase: " + err.message);
    }
  }

  // Atualiza os contadores superiores
  function calculateStats() {
    document.getElementById('stat-total').innerText = localOsData.length;
    document.getElementById('stat-abertas').innerText = localOsData.filter(o => o.status === 'aberta').length;
    document.getElementById('stat-andamento').innerText = localOsData.filter(o => o.status === 'andamento').length;
    document.getElementById('stat-concluidas').innerText = localOsData.filter(o => o.status === 'concluida').length;
  }

  // Renderiza tabela com os filtros aplicados
  function renderTable() {
    const tbody = document.getElementById('os-table-body');
    const search = document.getElementById('search-input').value.toLowerCase();
    const filterStatus = document.getElementById('filter-status').value;
    
    tbody.innerHTML = '';

    const filtered = localOsData.filter(os => {
      const matchesSearch = os.cliente.toLowerCase().includes(search) || os.equipamento.toLowerCase().includes(search);
      const matchesStatus = filterStatus ? os.status === filterStatus : true;
      return matchesSearch && matchesStatus;
    });

    if(filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--text3);">Nenhuma ordem de serviço encontrada.</td></tr>`;
      return;
    }

    filtered.forEach(os => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="os-id">#${os.id}</span></td>
        <td><strong>${os.cliente}</strong></td>
        <td>${os.equipamento}</td>
        <td><span class="badge" style="background:var(--bg3); color: #fff;">${os.prioridade}</span></td>
        <td><span class="badge badge-${os.status}">${os.status}</span></td>
        <td>
          <button class="btn btn-secondary btn-sm" onclick="editOs(${os.id})">Editar</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  // Modais controles
  function openNewOsModal() {
    document.getElementById('os-form').reset();
    document.getElementById('os-id-field').value = '';
    document.getElementById('modal-title').innerText = "Nova Ordem de Serviço";
    document.getElementById('os-modal').classList.add('open');
  }

  function editOs(id) {
    const os = localOsData.find(o => o.id === id);
    if(!os) return;

    document.getElementById('os-id-field').value = os.id;
    document.getElementById('os-cliente').value = os.cliente;
    document.getElementById('os-equipamento').value = os.equipamento;
    document.getElementById('os-descricao').value = os.descricao;
    document.getElementById('os-prioridade').value = os.prioridade;
    document.getElementById('os-status').value = os.status;

    document.getElementById('modal-title').innerText = `Editar OS #${os.id}`;
    document.getElementById('os-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('os-modal').classList.remove('open');
  }

  // Envia criação ou alteração para o Supabase
  async function saveOs() {
    const id = document.getElementById('os-id-field').value;
    const payload = {
      cliente: document.getElementById('os-cliente').value,
      equipamento: document.getElementById('os-equipamento').value,
      descricao: document.getElementById('os-descricao').value,
      prioridade: document.getElementById('os-prioridade').value,
      status: document.getElementById('os-status').value,
    };

    if(!payload.cliente || !payload.equipamento || !payload.descricao) {
      alert("Preencha todos os campos obrigatórios!");
      return;
    }

    try {
      if(id) {
        // Modo Edição
        const { error } = await supabaseClient.from('ordens_servico').update(payload).eq('id', id);
        if (error) throw error;
      } else {
        // Modo Nova OS
        const { error } = await supabaseClient.from('ordens_servico').insert([payload]);
        if (error) throw error;
      }
      
      closeModal();
      await fetchOrders();
    } catch (err) {
      alert("Erro ao salvar dados no Supabase: " + err.message);
    }
  }
</script>
</body>
</html>
