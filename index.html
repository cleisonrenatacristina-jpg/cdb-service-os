<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CDB Service OS — Ordens de Serviço</title>
<style>
  :root {
    --bg: #0B0F19;
    --bg2: #111827;
    --bg3: #1F2937;
    --surface: #1E293B;
    --border: #334155;
    --border2: #475569;
    --orange: #3B82F6; 
    --orange2: #2563EB;
    --orange-dim: rgba(59, 130, 246, 0.15);
    --text: #F8FAFC;
    --text2: #94A3B8;
    --text3: #64748B;
    --green: #10B981;
    --red: #EF4444;
    --yellow: #F59E0B;
    --blue: #3B82F6;
    --radius: 8px;
    --radius-lg: 16px;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
    font-size: 14px; 
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* SETUP SCREEN */
  #setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  #setup-screen h1 { font-size: 2.25rem; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 0.5rem; }
  #setup-screen p { color: var(--text2); margin-bottom: 2.5rem; font-size: 1.1rem; }
  
  .setup-card { 
    background: var(--bg2); 
    border: 1px solid var(--border); 
    border-radius: var(--radius-lg); 
    padding: 2.5rem; 
    width: 100%; 
    max-width: 480px; 
    box-shadow: var(--shadow-lg);
  }
  .setup-card h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 1.75rem; color: var(--text); display: flex; align-items: center; gap: 8px; }
  
  .field { margin-bottom: 1.25rem; }
  .field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
  .field input, .field select, .field textarea { 
    width: 100%; 
    background: var(--bg); 
    border: 1px solid var(--border); 
    border-radius: var(--radius); 
    color: var(--text); 
    padding: 12px 14px; 
    font-size: 14px; 
    outline: none; 
    transition: all 0.2s ease; 
  }
  .field input:focus, .field select:focus, .field textarea:focus { 
    border-color: var(--orange); 
    box-shadow: 0 0 0 3px var(--orange-dim); 
  }
  .field textarea { resize: vertical; min-height: 90px; font-family: inherit; }
  .field select option { background: var(--bg2); }
  
  .btn { 
    display: inline-flex; align-items: center; justify-content: center; gap: 8px; 
    padding: 10px 20px; border-radius: var(--radius); border: none; cursor: pointer; 
    font-size: 14px; font-weight: 600; transition: all 0.2s ease; letter-spacing: 0.3px;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--orange); color: #fff; box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3); }
  .btn-primary:hover { background: var(--orange2); box-shadow: 0 4px 6px rgba(59, 130, 246, 0.4); }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--text2); background: var(--bg3); }
  .btn-danger { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .btn-danger:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); }
  .btn-sm { padding: 6px 14px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; }
  
  .setup-note { margin-top: 1.25rem; font-size: 12px; color: var(--text3); line-height: 1.6; text-align: center; }
  .setup-note a { color: var(--orange); text-decoration: none; font-weight: 500; }

  /* LAYOUT */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  header { 
    background: rgba(17, 24, 39, 0.8); 
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); 
    padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; 
    height: 64px; position: sticky; top: 0; z-index: 100; 
  }
  .logo { font-weight: 800; font-size: 1.2rem; color: var(--orange); font-family: var(--font-mono); letter-spacing: 0.5px; }
  .logo span { color: var(--text); font-weight: 400; }
  
  nav { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: var(--radius); border: 1px solid var(--border); }
  nav button { background: transparent; border: none; color: var(--text2); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
  nav button.active { color: #fff; background: var(--surface); box-shadow: var(--shadow-sm); }
  
  .header-right { display: flex; align-items: center; gap: 16px; }
  .user-badge { font-size: 12px; font-weight: 600; color: var(--text); background: var(--surface); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); }
  
  main { flex: 1; padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow-sm); }
  .card-title { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1.25rem; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; }
  @media(max-width:768px) { .grid-2,.grid-3,.grid-4 { grid-template-columns: 1fr; } nav button span { display: none; } }

  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
  .stat-label { font-size: 12px; font-weight: 600; color: var(--text3); margin-bottom: 8px; }
  .stat-value { font-size: 32px; font-weight: 800; color: var(--text); font-family: var(--font-mono); }
  .stat-value.orange { color: var(--orange); }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }

  .os-table { width: 100%; border-collapse: separate; border-spacing: 0; }
  .os-table th { text-align: left; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .os-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .os-table tr:hover td { background: rgba(255, 255, 255, 0.02); }
  .os-id { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--text); background: var(--bg); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; }
  
  .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-open { background: rgba(59, 130, 246, 0.1); color: var(--blue); }
  .badge-progress { background: rgba(245, 158, 11, 0.1); color: var(--yellow); }
  .badge-done { background: rgba(16, 185, 129, 0.1); color: var(--green); }
  .badge-waiting { background: rgba(100, 116, 139, 0.1); color: var(--text2); }
  .badge-alta { background: rgba(239, 68, 68, 0.1); color: var(--red); }
  .badge-media { background: rgba(245, 158, 11, 0.1); color: var(--yellow); }
  .badge-baixa { background: rgba(16, 185, 129, 0.1); color: var(--green); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(6px); z-index: 200; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 100%; max-width: 640px; margin: auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem; border-bottom: 1px solid var(--border); }
  .modal-body { padding: 1.5rem; }
  .modal-footer { padding: 1.25rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: 12px; justify-content: flex-end; }
  .close-btn { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 20px; }

  .alert { padding: 12px 16px; border-radius: var(--radius); font-size: 13.5px; margin-bottom: 1.25rem; }
  .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #FCA5A5; }
  .alert-success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #6EE7B7; }
  .alert-info { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); color: #93C5FD; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .section-header h2 { font-size: 1.25rem; font-weight: 800; }

  .client-banner { background: linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem 2rem; margin-bottom: 2rem; }
  .client-banner h1 { font-size: 1.5rem; font-weight: 800; color: var(--text); }
  .client-banner p { color: var(--text2); font-size: 14px; }

  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; margin-top: 12px; }
  .photo-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; }

  .loading { text-align: center; padding: 4rem 2rem; color: var(--text3); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--surface); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s infinite; margin-right: 12px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
  .filter-bar input, .filter-bar select { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 10px 14px; font-size: 13.5px; outline: none; }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--orange); }
  .filter-bar input { flex: 1; min-width: 200px; }

  .material-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
  .material-row input { flex: 1; }
  .material-row input.qty { flex: 0 0 80px; }

  .report-section { margin-bottom: 2rem; }
  .report-section h3 { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

  .empty { text-align: center; padding: 4rem 2rem; color: var(--text3); }
  .empty svg { width: 56px; height: 56px; margin: 0 auto 1.25rem; opacity: 0.4; }
  .empty p { margin-bottom: 1.25rem; }

  @media print {
    header, nav, .no-print { display: none !important; }
    body { background: #fff; color: #000; }
    .modal { border: none; }
  }

  .inner-tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .inner-tab { background: none; border: none; color: var(--text2); padding: 10px 16px; cursor: pointer; font-size: 13.5px; font-weight: 600; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .inner-tab.active { color: var(--orange); border-bottom-color: var(--orange); }

  select { background: var(--bg3) !important; }
</style>
</head>
<body>

    <div class="field">
